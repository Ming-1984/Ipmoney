name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: OpenAPI lint
        run: pnpm openapi:lint

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: API minimal tests
        run: pnpm -C apps/api test

      - name: Scan banned words
        run: pnpm scan:banned-words

      - name: Generate OpenAPI types & reports (must be committed)
        run: |
          pnpm openapi:types
          node scripts/audit-openapi-backend.mjs
          node scripts/audit-coverage.mjs
          git diff --exit-code

      - name: Build (with non-local API base)
        env:
          VITE_API_BASE_URL: https://staging-api.example.com
          TARO_APP_API_BASE_URL: https://staging-api.example.com
        run: |
          pnpm -C apps/api build
          pnpm -C apps/admin-web build
          pnpm -C apps/client build:h5
          pnpm -C apps/client build:weapp
          pnpm check:weapp-budget
