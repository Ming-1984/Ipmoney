  /health:
    get:
      tags:
        - System
      summary: йҚӢгғҘжӮҚеҰ«вӮ¬йҸҢ?
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                  checks:
                    type: object
                    properties:
                      db:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          message:
                            type: string
                      redis:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          message:
                            type: string
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/wechat/mp-login:
    post:
      tags:
        - Auth
      summary: еҜ°оҶ»дҝҠзҒҸеҝ•в–јжҗҙеҝ•ж«ҘиӨ°жӣӘзҙҷcode йҲ«?tokenй”ӣ?
      description: |
        зҒҸеҝ•в–јжҗҙеҝ•оҒ¬й–«ж°із№ғ `wx.login` й‘ҫеі°еҪҮ `code` йҚҡеәӨзҡҹйҗўг„Ұж№°йҺәгғҘеҪӣйҠҶ?
        з’Үеӯҳж§‘й”ӣ?        - йҸҲе¶…е§ҹз»”оҲҡз°ІжөЈи·Ёж•ӨеҜ°оҶ»дҝҠ `code2Session`й”ӣеқ„/sns/jscode2session`й”ӣеӨӢеҙІйҚҷ?`openid/session_key`й”ӣеұҪиӢҹйҺё?`openid` йҚӢж°ұж•ӨйҺҙй”Ӣж§§зҒҸеӢ«жӮ—з»ӣжғ§еҪӮйӘһеҶІеҪҙ `accessToken`йҠҶ?        - `wx.login` ж¶“е¶Ҳз№‘йҚҘзӮІгҒ”йҚҚ?йҸ„з”өРһй”ӣж°¬гҒ”йҚҚ?йҸ„з”өРһеҜӨйёҝоҶ…з’§?`chooseAvatar + input type="nickname"`й”ӣеұҪиӢҹй–«ж°із№ғ `POST /files` + `PATCH /me` й’Җи—үз°ұйҠҶ?
      operationId: authWechatMpLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/wechat/phone-bind:
    post:
      tags:
        - Auth
      summary: WeChat phone bind (Mini Program)
      description: |
        Mini Program obtains `phoneCode` from `open-type="getPhoneNumber"` and calls this API to bind the phone.

        Notes:
        - Requires BearerAuth.
        - Real implementation should call WeChat `phonenumber.getPhoneNumber` and persist the phone to the user profile.
      operationId: authWechatPhoneBind
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneCode
              properties:
                phoneCode:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - phone
                properties:
                  phone:
                    $ref: '#/components/schemas/PhoneNumber'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/sms/send:
    post:
      tags:
        - Auth
      summary: йҚҷжҲҰвӮ¬дҪәз…ӯж·Үпҝ зҚҷз’ҮдҪәзҲң
      operationId: authSmsSend
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - purpose
              properties:
                phone:
                  $ref: '#/components/schemas/PhoneNumber'
                purpose:
                  $ref: '#/components/schemas/SmsPurpose'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
