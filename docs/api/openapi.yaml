  /public/industry-tags:
    get:
      tags: [Regions]
      summary: 鑾峰彇浜т笟鏍囩鍒楄〃锛堢敤浜庣瓫閫夛級
      operationId: listPublicIndustryTags
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
