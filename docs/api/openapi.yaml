        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications:
    get:
      tags: [Notifications]
      summary: 閫氱煡鍒楄〃
      operationId: listMyNotifications
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedNotification"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/{notificationId}:
    get:
      tags: [Notifications]
      summary: 閫氱煡璇︽儏
      operationId: getNotificationById
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /files:
    post:
      tags: [Files]
      summary: 涓婁紶鏂囦欢
      description: |
        鐢ㄤ簬涓婁紶澶村儚/璁よ瘉鏉愭枡/鍚堝悓绛夋枃浠躲€?
        灏忕▼搴忓ご鍍忓缓璁細
        1) `purpose=AVATAR`
        2) 涓婁紶鎴愬姛鎷垮埌 `url`
        3) `PATCH /me { avatarUrl: url }`
      operationId: uploadFile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  $ref: "#/components/schemas/FilePurpose"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /files/{fileId}:
    get:
      tags: [Files]
      summary: Download file
      operationId: downloadFile
      security:
        - BearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
        - name: token
          in: query
          required: false
          description: 涓存椂璁块棶 token锛堢敤浜庢棤闇€鐧诲綍鐨勪笅杞斤級
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{fileId}/preview:
    get:
      tags: [Files]
      summary: 棰勮鏂囦欢锛堝甫姘村嵃锛?
      operationId: previewFile
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
        - name: token
          in: query
          required: false
          description: 涓存椂璁块棶 token锛堢敤浜庢棤闇€鐧诲綍鐨勯瑙堬級
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{fileId}/temporary-access:
    post:
      tags: [Files]
      summary: 鐢熸垚涓存椂璁块棶閾炬帴
      operationId: createFileTemporaryAccess
      security:
        - BearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileTemporaryAccessRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTemporaryAccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /patents/normalize:
    post:
      tags: [Patents]
      summary: 涓撳埄鍙风爜瑙ｆ瀽涓庤鑼冨寲
      operationId: normalizePatentNumber
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatentNormalizeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatentNormalizeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /patents/{patentId}:
    get:
      tags: [Patents]
      summary: 鑾峰彇涓撳埄涓绘暟鎹?
      operationId: getPatentById
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PatentId"
      responses:
