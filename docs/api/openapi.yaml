  - name: TechManagers
    description: Tech managers
  - name: Orders
    description: Orders
  - name: Payments
    description: Payments
  - name: Refunds
    description: Refunds
  - name: Cases
    description: Cases
  - name: Invoices
    description: Invoices
  - name: Messaging
    description: Messaging
  - name: Notifications
    description: Notifications
  - name: Comments
    description: Comments
  - name: Regions
    description: Regions
  - name: Admin
    description: Admin
  - name: AI
    description: AI
  - name: Maintenance
    description: Maintenance
  - name: Alerts
    description: Alerts
  - name: System
