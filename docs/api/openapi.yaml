components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  parameters:
    Q:
      name: q
      in: query
      required: false
      schema:
        type: string
      description: йҚҸжҠҪж•ӯз’Үе¶ҸзҙҷйҸҚеӣ¬о•Ҫ/йҺҪжЁҝоӣҰ/йҸүеҶЁеҹ„жөң?йҚҷжҲһж§‘жөң?йҸҲзғҳзҖҜйҚҡе¶ҮРһз»ӣеӨӣзҙҡ
    PatentType:
      name: patentType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/PatentType'
    TradeMode:
      name: tradeMode
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TradeMode'
    LicenseMode:
      name: licenseMode
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/LicenseMode'
      description: License mode filter (valid when tradeMode=LICENSE)
    PriceType:
      name: priceType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/PriceType'
    PriceMin:
      name: priceMin
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/MoneyFen'
    PriceMax:
      name: priceMax
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/MoneyFen'
    DepositMin:
      name: depositMin
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/MoneyFen'
    DepositMax:
      name: depositMax
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/MoneyFen'
    TransferCountMin:
      name: transferCountMin
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
    TransferCountMax:
      name: transferCountMax
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
    ListingTopic:
      name: listingTopic
      in: query
      required: false
