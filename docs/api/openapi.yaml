                  description: жҫ¶жқ‘е„ҡ URLй”ӣж¶ҳзј“з’ҒоҶјеҺӣ `POST /files` ж¶“е©Ғзҙ¶й”ӣеқ„purpose=AVATAR`й”ӣеӨҠе•ҖйҚҗж¬ҸеҸҶ
                regionCode:
