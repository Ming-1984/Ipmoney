  /me/recommendations/listings:
    get:
      tags: [Search]
      summary: 鐚滀綘鍠滄锛堜釜鎬у寲鎺ㄨ崘锛?
      operationId: getMyRecommendedListings
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RegionCode"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
