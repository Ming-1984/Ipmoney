  /public/organizations/{orgUserId}:
    get:
      tags: [Organizations]
      summary: 鑾峰彇鏈烘瀯璇︽儏锛堝叕寮€锛?
      operationId: getPublicOrganizationById
      security: []
      parameters:
        - $ref: "#/components/parameters/OrgUserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
