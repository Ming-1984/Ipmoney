  /regions:
    get:
      tags: [Regions]
      summary: 鑾峰彇琛屾斂鍖哄垝鏍戯紙鐢ㄤ簬绛涢€?鍦板浘锛?
      description: |-
        鐢ㄤ簬鍦板尯绛涢€変笌鍦板浘瀹氫綅銆?
        灏忕▼搴忋€屼笓鍒╁湴鍥俱€峆0锛堟渶蹇惤鍦帮級浼氱敤 `level=PROVINCE` 鑾峰彇鍚勭渷浠界殑 `centerLat/centerLng` 浣滀负鍦板浘 marker 鍧愭爣銆?
      operationId: listRegions
      security: []
      parameters:
        - name: level
          in: query
          required: false
