      summary: еЁ‘ж’ҙжҢёйҚ©еӢҜеҙЈжӨӢеәЈеһійҗҹж¬ҷзөҫйҗҺиҠҘзЁүжҗҙгӮҺжҪҗй–јз…Һе•«зҖө?
      operationId: normalizePatentNumber
