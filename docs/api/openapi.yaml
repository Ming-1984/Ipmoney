                  description: й–әеӢӯж•ёиўЁй–ҝж¶ҷзЁ‘йҗЁо„ӮзІҷзҖЈоҒҶзўҚзјҒж—‘еһ°зјӮж’¶жӢӢйЎ”иҜІв–Ҹй–»?`<input type="nickname">` й—ҒжҸ’жҙӯеЁү?
                avatarUrl:
                  type: string
