      tags: [Comments]
      summary: 鑾峰彇涓婃灦鐣欒█鍒楄〃锛堝叕寮€锛?
      operationId: listPublicListingComments
      security: []
      parameters:
        - $ref: "#/components/parameters/ListingId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedCommentThread"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /public/tech-managers/{techManagerId}:
    get:
      tags: [TechManagers]
      summary: 鑾峰彇鎶€鏈粡鐞嗕汉璇︽儏锛堝叕寮€锛?
      operationId: getPublicTechManagerById
      security: []
      parameters:
        - $ref: "#/components/parameters/TechManagerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechManagerPublic"
