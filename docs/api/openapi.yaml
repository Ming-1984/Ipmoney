paths:
  /health:
    get:
      tags:
        - System
      summary: й–ёе¬Ёе„ұйҺ®е¶…ОӣйҲ§о„„еј»?
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                  checks:
                    type: object
                    properties:
                      db:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          message:
                            type: string
                      redis:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          message:
                            type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /WW_verify_YpAqDE4xoAPsmGSK.txt:
    get:
      tags:
        - System
      summary: WeCom domain ownership verification file
      operationId: getWecomDomainVerificationFile
      security: []
      responses:
        '200':
          description: Plain-text WeCom domain verification content.
          content:
            text/plain:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
  /auth/wechat/mp-login:
    post:
      tags:
        - Auth
      summary: Mini Program login via wx.login code2Session
      description: |
        Exchange `wx.login` code with WeChat `code2Session`, map `openid` to platform user,
        and issue platform `accessToken`.
        - Request body requires `code`.
        - Demo-only code (`demo`) is accepted only when demo auth is enabled in non-release env.
      operationId: authWechatMpLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/wechat/phone-login:
    post:
      tags:
        - Auth
      summary: Mini Program phone login via wx.login + getPhoneNumber
      description: |
        Exchange `wx.login` code and `getPhoneNumber` code with WeChat services,
        match or create platform user by `openid` and normalized phone number,
        and issue platform `accessToken`.
      operationId: authWechatPhoneLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WechatPhoneLoginRequest'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/wechat/phone-bind:
    post:
      tags:
        - Auth
      summary: WeChat phone bind (Mini Program)
      description: |
        Mini Program obtains `phoneCode` from `open-type="getPhoneNumber"` and calls this API to bind the phone.

        Notes:
        - Requires BearerAuth.
        - Server validates WeChat signature chain and persists bound phone on current user.
      operationId: authWechatPhoneBind
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneCode
              properties:
                phoneCode:
                  type: string
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                type: object
                required:
                  - phone
                properties:
                  phone:
                    $ref: '#/components/schemas/PhoneNumber'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/sms/send:
    post:
      tags:
        - Auth
      summary: Send SMS code
      description: |
        Send verification code by configured SMS provider.
        - In release-like environments (production/staging), `SMS_PROVIDER` and provider credentials must be configured.
        - In non-release environments, server may return `debugCode` for local debugging.
      operationId: authSmsSend
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  $ref: '#/components/schemas/PhoneNumber'
                purpose:
                  $ref: '#/components/schemas/SmsPurpose'
                  description: Optional, defaults to `LOGIN` when omitted.
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                type: object
                required:
                  - cooldownSeconds
                properties:
                  cooldownSeconds:
                    type: integer
                    minimum: 0
                  debugCode:
                    type: string
                    description: Development-only debug field. Not returned in production.
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/sms/verify:
    post:
      tags:
        - Auth
      summary: Verify SMS code and login
      operationId: authSmsVerify
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - code
              properties:
                phone:
                  $ref: '#/components/schemas/PhoneNumber'
                code:
                  type: string
                  minLength: 4
                  maxLength: 8
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/session:
    get:
      tags:
