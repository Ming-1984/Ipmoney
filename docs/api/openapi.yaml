openapi: 3.0.3
info:
  title: Ipmoney API
  version: 0.1.0
  license:
    name: Proprietary
    url: https://ipmoney.com
  description: |
    Ipmoney API (P0) for mini-program, H5 and admin console.
servers:
  - url: https://api.ipmoney.cn
tags:
  - name: Auth
    description: Auth
  - name: Users
    description: Users
  - name: Organizations
    description: Organizations
  - name: Config
    description: Config
  - name: Files
    description: Files
  - name: Patents
    description: Patents
  - name: Search
    description: Search
  - name: Listings
    description: Listings
  - name: Achievements
    description: Achievements
  - name: TechManagers
    description: Tech managers
  - name: Orders
    description: Orders
  - name: Payments
    description: Payments
  - name: Refunds
    description: Refunds
  - name: Cases
    description: Cases
  - name: Invoices
    description: Invoices
  - name: Messaging
    description: Messaging
  - name: Notifications
    description: Notifications
  - name: Comments
    description: Comments
  - name: Regions
    description: Regions
  - name: Admin
    description: Admin
  - name: AI
    description: AI
  - name: Maintenance
    description: Maintenance
  - name: Alerts
    description: Alerts
  - name: System
    description: System
paths:
  /health:
    get:
      tags:
        - System
      summary: 閸嬨儱鎮嶅Λ鈧弻?
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                  checks:
                    type: object
                    properties:
                      db:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          message:
                            type: string
                      redis:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          message:
                            type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /auth/wechat/mp-login:
    post:
      tags:
        - Auth
      summary: Mini Program login via wx.login code2Session
      description: |
        Exchange `wx.login` code with WeChat `code2Session`, map `openid` to platform user,
        and issue platform `accessToken`.
        - Request body requires `code`.
        - Demo-only code (`demo`) is accepted only when demo auth is enabled in non-release env.
      operationId: authWechatMpLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/wechat/phone-bind:
    post:
      tags:
        - Auth
      summary: WeChat phone bind (Mini Program)
      description: |
        Mini Program obtains `phoneCode` from `open-type="getPhoneNumber"` and calls this API to bind the phone.

        Notes:
        - Requires BearerAuth.
        - Server validates WeChat signature chain and persists bound phone on current user.
      operationId: authWechatPhoneBind
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneCode
              properties:
                phoneCode:
                  type: string
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                type: object
                required:
                  - phone
                properties:
                  phone:
                    $ref: '#/components/schemas/PhoneNumber'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/sms/send:
    post:
      tags:
        - Auth
      summary: Send SMS code
      operationId: authSmsSend
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - purpose
              properties:
                phone:
                  $ref: '#/components/schemas/PhoneNumber'
                purpose:
                  $ref: '#/components/schemas/SmsPurpose'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                type: object
                required:
                  - cooldownSeconds
                properties:
                  cooldownSeconds:
                    type: integer
                    minimum: 0
                  debugCode:
                    type: string
                    description: Development-only debug field. Not returned in production.
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/sms/verify:
    post:
      tags:
        - Auth
      summary: Verify SMS code and login
      operationId: authSmsVerify
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - code
              properties:
                phone:
                  $ref: '#/components/schemas/PhoneNumber'
                code:
                  type: string
                  minLength: 4
                  maxLength: 8
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/session:
    get:
      tags:
        - Auth
      summary: Get current auth session
      operationId: authGetSession
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me:
    get:
      tags:
        - Users
      summary: 閼惧嘲褰囬幋鎴犳畱鐠у嫭鏋?
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags:
        - Users
      summary: 閺囧瓨鏌婇幋鎴犳畱鐠у嫭鏋?
      operationId: updateMe
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  maxLength: 50
                  description: 閺勭數袨閿涙稑鐨粙瀣碍缁旑垰缂撶拋顔诲▏閻?`<input type="nickname">` 闁插洭娉?
                avatarUrl:
                  type: string
                  format: uri
                  description: 婢舵潙鍎?URL閿涙稑缂撶拋顔煎帥 `POST /files` 娑撳﹣绱堕敍鍧刾urpose=AVATAR`閿涘鍟€閸愭瑥鍙?
                regionCode:
                  type: string
                  description: 閻劋绨崷鏉跨厵閹恒劏宕橀敍娑樼毈缁嬪绨€规矮缍?閹靛濮╅柅澶嬪閸氬骸褰查弴瀛樻煀

      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/verification:
    get:
      tags:
        - Users
      summary: 閼惧嘲褰囬幋鎴犳畱鐠併倛鐦夋穱鈩冧紖
      operationId: getMyVerification
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserVerification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Users
      summary: 閹绘劒姘︾拋銈堢槈
      operationId: submitMyVerification
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserVerificationSubmitRequest'
      responses:
        '201':
          description: Created

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserVerification'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /me/addresses:
    get:
      tags:
        - Users
      summary: 閹存垹娈戦崷鏉挎絻閸掓銆?
      operationId: listMyAddresses
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Users
      summary: 閺傛澘顤冮崷鏉挎絻
      operationId: createMyAddress
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressCreateRequest'
      responses:
        '201':
          description: Created

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/addresses/{addressId}:
    patch:
      tags:
        - Users
      summary: 閺囧瓨鏌婇崷鏉挎絻
      operationId: updateMyAddress
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressUpdateRequest'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Users
      summary: 閸掔娀娅庨崷鏉挎絻
      operationId: deleteMyAddress
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/favorites:
    get:
      tags:
        - Listings
      summary: 閹存垹娈戦弨鎯版閸掓銆?
      operationId: listMyFavoriteListings
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedListingSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/favorites/achievements:
    get:
      tags:
        - Achievements
      summary: List my favorite achievements
      operationId: listMyFavoriteAchievements
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAchievementSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/recommendations/listings:
    get:
      tags:
        - Search
      summary: 閻氭粈缍橀崰婊勵偨閿涘牅閲滈幀褍瀵查幒銊ㄥ礃閿?
      operationId: getMyRecommendedListings
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RegionCode'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedListingSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /notifications:
    get:
      tags:
        - Notifications
      summary: 闁氨鐓￠崚妤勩€?
      operationId: listMyNotifications
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedNotification'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /notifications/{notificationId}:
    get:
      tags:
        - Notifications
      summary: 闁氨鐓＄拠锔藉剰
      operationId: getNotificationById
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /files:
    post:
      tags:
        - Files
      summary: 娑撳﹣绱堕弬鍥︽
      description: |
        閻劋绨稉濠佺炊婢舵潙鍎?鐠併倛鐦夐弶鎰灐/閸氬牆鎮撶粵澶嬫瀮娴犺翰鈧?
        鐏忓繒鈻兼惔蹇撱仈閸嶅繐缂撶拋顕嗙窗
        1) `purpose=AVATAR`
        2) 娑撳﹣绱堕幋鎰閹峰灝鍩?`url`
        3) `PATCH /me { avatarUrl: url }`
      operationId: uploadFile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  $ref: '#/components/schemas/FilePurpose'
      responses:
        '201':
          description: Created

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /files/{fileId}:
    get:
      tags:
        - Files
      summary: Download file
      operationId: downloadFile
      security:
        - BearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: token
          in: query
          required: false
          description: 娑撳瓨妞傜拋鍧楁６ token閿涘牏鏁ゆ禍搴㈡￥闂団偓閻ц缍嶉惃鍕瑓鏉炴枻绱?
          schema:
            type: string
      responses:
        '200':
          description: OK

          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /files/{fileId}/preview:
    get:
      tags:
        - Files
      summary: 妫板嫯顫嶉弬鍥︽閿涘牆鐢鏉戝祪閿?
      operationId: previewFile
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: token
          in: query
          required: false
          description: 娑撳瓨妞傜拋鍧楁６ token閿涘牏鏁ゆ禍搴㈡￥闂団偓閻ц缍嶉惃鍕暕鐟欏牞绱?
          schema:
            type: string
      responses:
        '200':
          description: OK

          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /files/{fileId}/temporary-access:
    post:
      tags:
        - Files
      summary: 閻㈢喐鍨氭稉瀛樻鐠佸潡妫堕柧鐐复
      operationId: createFileTemporaryAccess
      security:
        - BearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileTemporaryAccessRequest'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileTemporaryAccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /patents/normalize:
    post:
      tags:
        - Patents
      summary: 娑撴挸鍩勯崣椋庣垳鐟欙絾鐎芥稉搴ゎ潐閼煎啫瀵?
      operationId: normalizePatentNumber
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatentNormalizeRequest'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatentNormalizeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /patents/{patentId}:
    get:
      tags:
        - Patents
      summary: 閼惧嘲褰囨稉鎾冲焺娑撶粯鏆熼幑?
      operationId: getPatentById
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatentId'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /public/config/trade-rules:
    get:
      tags:
        - Config
      summary: 閼惧嘲褰囨禍銈嗘鐟欏嫬鍨柊宥囩枂閿涘牆澧犻崣鏉跨潔缁€铏规暏閿?
      operationId: getPublicTradeRulesConfig
      security: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeRulesConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
  /public/config/customer-service:
    get:
      tags:
        - Config
      summary: 閼惧嘲褰囩€广垺婀囬柊宥囩枂閿涘牆澧犻崣鏉跨潔缁€铏规暏閿?
      operationId: getPublicCustomerServiceConfig
      security: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerServiceConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
  /public/config/banner:
    get:
      tags:
        - Config
      summary: Get banner config (public)
      operationId: getPublicBannerConfig
      security: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BannerConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
  /public/config/home-announcements:
    get:
      tags:
        - Config
      summary: Get homepage announcements feed (public)
      operationId: getPublicHomeAnnouncementsFeed
      security: []
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicHomeAnnouncementFeed'
        '400':
          $ref: '#/components/responses/BadRequest'
  /public/listings/{listingId}:
    get:
      tags:
        - Listings
      summary: 閼惧嘲褰囨稉濠冪仸鐠囷附鍎忛敍鍫濆彆瀵偓閿?
      operationId: getPublicListingById
      security: []
      parameters:
        - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingPublic'
        '404':
          $ref: '#/components/responses/NotFound'
  /public/listings/{listingId}/comments:
    get:
      tags:
        - Comments
      summary: 閼惧嘲褰囨稉濠冪仸閻ｆ瑨鈻堥崚妤勩€冮敍鍫濆彆瀵偓閿?
      operationId: listPublicListingComments
      security: []
      parameters:
        - $ref: '#/components/parameters/ListingId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCommentThread'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /public/achievements/{achievementId}:
    get:
      tags:
        - Achievements
      summary: Get public achievement detail
      operationId: getPublicAchievementById
      security: []
      parameters:
        - $ref: '#/components/parameters/AchievementId'
      responses:
        '200':
          description: OK

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /public/achievements/{achievementId}/comments:
    get:
      tags:
        - Comments
        - Achievements
      summary: List public achievement comments
      operationId: listPublicAchievementComments
      security: []
