      summary: й–әеӣ§з“ЁйҸҢе©Үе№ӢйҺҙзҠіз•ұйҗ Сғе«ӯйҸӢ?
      operationId: updateMe
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
