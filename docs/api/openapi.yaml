                  description: е©ўиҲөжҪҷйҚҺ?URLй–ҝж¶ҷзЁ‘зјӮж’¶жӢӢйЎ”з…ҺеёҘ `POST /files` еЁ‘ж’іп№Јз»ұе •ж•ҚйҚ§еҲҫurpose=AVATAR`й–ҝж¶ҳоҳҜйҚҹвӮ¬й–ёж„ӯз‘ҘйҚҷ?
                regionCode:
                  type: string
                  description: й–»оқ¬еҠӢз»Ёо„„еҙ·йҸүи·ЁеҺөй–№жҒ’еҠҸе®•ж©Җж•ҚеЁ‘жЁјжҜҲзјҒе¬Әоғ…з»Ёо… вӮ¬и§„зҹ®зјҚ?й–№йқӣоғ…жҝ®в•…жҹ…жҫ¶е¬ӘоҒҘй–ёж°¬йӘёиӨ°жҹҘејҙзҖӣжЁ»з…Җ

      responses:
